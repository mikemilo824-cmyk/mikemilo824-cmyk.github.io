name: Update spot.json

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  update-spot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch spot from Metals.dev
        env:
          API_KEY: ${{ secrets.METALS_API_KEY }}
        run: |
          set -e
          curl -L --fail \
            "https://api.metals.dev/v1/latest?api_key=${API_KEY}&currency=USD&unit=toz" \
            -H "Accept: application/json" \
            -o raw.json

          echo "raw.json sample:"
          head -c 400 raw.json || true
          echo ""

      - name: Build spot.json
        run: |
          set -e
          STATUS=$(jq -r '.status // empty' raw.json)
          GOLD=$(jq -r '.metals.gold // empty' raw.json)
          SILVER=$(jq -r '.metals.silver // empty' raw.json)

          if [ "$STATUS" != "success" ] || [ -z "$GOLD" ] || [ -z "$SILVER" ]; then
            echo "Could not parse Metals.dev response"
            cat raw.json
            exit 1
          fi

          jq -n \
            --arg source "metals.dev" \
            --arg updated_utc "$(date -u +%FT%TZ)" \
            --argjson gold_usd_oz "$GOLD" \
            --argjson silver_usd_oz "$SILVER" \
            '{source:$source, updated_utc:$updated_utc, gold_usd_oz:$gold_usd_oz, silver_usd_oz:$silver_usd_oz}' \
            > spot.json

          echo "spot.json:"
          cat spot.json

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spot.json
          git commit -m "Update spot.json" || exit 0
          git push
