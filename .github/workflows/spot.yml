name: Update spot.json

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-spot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch spot from GoldPrice
        run: |
          set -e
          curl -L --fail "https://data-asg.goldprice.org/dbXRates/USD" -o raw.json
          echo "raw.json sample:"
          head -c 400 raw.json || true
          echo ""

      - name: Build spot.json
        run: |
          set -e
          GOLD=$(jq -r '.items[0].xauPrice // empty' raw.json)
          SILVER=$(jq -r '.items[0].xagPrice // empty' raw.json)

          if [ -z "$GOLD" ] || [ -z "$SILVER" ]; then
            echo "Could not parse gold/silver from raw.json"
            cat raw.json
            exit 1
          fi

          jq -n \
            --arg source "goldprice.org" \
            --arg updated_utc "$(date -u +%FT%TZ)" \
            --argjson gold_usd_oz "$GOLD" \
            --argjson silver_usd_oz "$SILVER" \
            '{source:$source, updated_utc:$updated_utc, gold_usd_oz:$gold_usd_oz, silver_usd_oz:$silver_usd_oz}' \
            > spot.json

          echo "spot.json:"
          cat spot.json

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spot.json
          git commit -m "Update spot.json" || exit 0
          git push
