name: Update spot.json

on:
  workflow_dispatch:
  schedule:
    - cron: "*/60 * * * *"

permissions:
  contents: write

jobs:
  update-spot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch spot from Metals.dev
        env:
          API_KEY: ${{ secrets.METALS_API_KEY }}
        run: |
          curl -L --fail \
          "https://api.metals.dev/v1/latest?api_key=$API_KEY&currency=USD&unit=toz" \
          -o raw.json

          echo "raw sample:"
          head -c 300 raw.json

      - name: Build spot.json
        run: |
          GOLD=$(jq -r '.metals.gold' raw.json)
          SILVER=$(jq -r '.metals.silver' raw.json)

          jq -n \
            --arg source "metals.dev" \
            --arg updated_utc "$(date -u +%FT%TZ)" \
            --argjson gold_usd_oz "$GOLD" \
            --argjson silver_usd_oz "$SILVER" \
            '{source:$source,updated_utc:$updated_utc,gold_usd_oz:$gold_usd_oz,silver_usd_oz:$silver_usd_oz}' \
            > spot.json

      - name: Commit update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add spot.json
          git commit -m "Update spot prices" || exit 0
          git push
